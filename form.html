<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="./css/form.css">
</head>

<body style="background-color: black;">

    <div class="block1">


        <div>

            <div class="my-box">

                <span class="ma-text1">Login</span>
                <span class="ma-text2">|</span>
                <span class="ma-text3">Register</span>

            </div>

            <div>
                <p style="margin-left: 100px;">Enter your email and password to register.</p>
            </div>



            <form action="#" method="post">

                <input type="text" class="input-type" placeholder="Username" required>
                <input type="email" class="input-type" placeholder="Enter your email address" required>
                <input type="password" class="input-type" placeholder="Password" required>
                <input type="password" class="input-type" placeholder="Confirm Password" required>

                <button class="button-submit" type="submit">Register</button>



            </form>

            <p class="par"> ____________Or register with_____________</p>

            <button type="button" class="butt"> G Continue with Google </button>

            <button type="button" class="butt-2"> F Continue with Facebook</button>



        </div>

        <div style="background-color: chartreuse; width: 500; height: 10px; margin-top: 30px;"> </div>

    </div>


</body>

</html>
